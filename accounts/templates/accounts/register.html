{% extends "base.html" %}
{% block title %}Registrierung{% endblock %}
{% block content %}

<h1>Registrieren</h1>
<div class="form-card">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p style="color:var(--danger); font-size:0.85rem; margin-top:0.3rem">{{ field.errors|join:", " }}</p>
            {% endif %}
        {% endfor %}
        <div class="btn-row">
            <button type="submit" class="btn btn-primary">Registrieren</button>
        </div>
    </form>
    <hr>
    <p style="font-size:0.9rem; color:var(--muted)">
        Bereits Mitglied? <a href="{% url 'login' %}" style="color:var(--accent2)">Hier einloggen</a>
    </p>
</div>

{% endblock %}
